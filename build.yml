
# .github/workflows/build-package.yml

name: Build OpenWrt Package

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# ======================================================================================
# ==                            👇 用户配置区域 👇                            ==
# ======================================================================================
env:
  # 1. 设置你要编译的软件包名称 (必须与你的软件包目录名相同)
  #    例如: luci-app-adguardhome, v2ray-core, kmod-wireguard 等
  PACKAGE_NAME: my-cool-package

  # 2. 设置要编译的 OpenWrt 版本 (可以是分支名或标签名)
  #    例如: 'v23.05.3', 'openwrt-23.05', 'master'
  OPENWRT_VERSION: 'v24.10.3
# ======================================================================================
# ==                            👆 用户配置区域 👆                            ==
# ======================================================================================

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: x86_64
            target: x86
            subtarget: 64
            profile: generic
          - name: armv8_cortex-a53
            target: armvirt
            subtarget: 64
            profile: generic
          - name: mips_mt7621
            target: ramips
            subtarget: mt7621
            profile: default

    name: Build for ${{ matrix.target.name }}

    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache OpenWrt build environment
        id: cache-openwrt
        uses: actions/cache@v4
        with:
          path: openwrt
          key: ${{ runner.os }}-openwrt-${{ env.OPENWRT_VERSION }}-${{ matrix.target.name }}-${{ hashFiles('openwrt/.config') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ env.OPENWRT_VERSION }}-${{ matrix.target.name }}-

      - name: Clone OpenWrt source
        if: steps.cache-openwrt.outputs.cache-hit != 'true'
        run: git clone https://github.com/openwrt/openwrt.git --depth 1 --branch ${{ env.OPENWRT_VERSION }} openwrt

      - name: Prepare build environment
        if: steps.cache-openwrt.outputs.cache-hit != 'true'
        working-directory: ./openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy package and generate build config
        working-directory: ./openwrt
        run: |
          cp -r ../${{ env.PACKAGE_NAME }} ./package/
          cat <<EOF > .config
          CONFIG_TARGET_${{ matrix.target.target }}=y
          CONFIG_TARGET_${{ matrix.target.target }}_${{ matrix.target.subtarget }}=y
          CONFIG_TARGET_${{ matrix.target.target }}_${{ matrix.target.subtarget }}_DEVICE_${{ matrix.target.profile }}=y
          CONFIG_PACKAGE_${{ env.PACKAGE_NAME }}=m
          EOF
          make defconfig

      - name: Compile the package
        working-directory: ./openwrt
        run: |
          make download -j$(nproc)
          make package/${{ env.PACKAGE_NAME }}/compile -j$(nproc) V=s

      - name: Find .ipk package
        id: find_ipk
        working-directory: ./openwrt
        run: |
          ipk_path=$(find ./bin/packages -name "${{ env.PACKAGE_NAME }}*.ipk" | head -n 1)
          if [ -z "$ipk_path" ]; then
            echo "::error::IPK file not found!"
            exit 1
          fi
          echo "path=$ipk_path" >> $GITHUB_OUTPUT

      - name: Upload .ipk artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ matrix.target.name }}
          path: openwrt/${{ steps.find_ipk.outputs.path }}
          if-no-files-found: error

  comment-on-commit:
    runs-on: ubuntu-latest
    needs: build
    if: success()
    steps:
      - name: Comment on commit
        uses: peter-evans/commit-comment@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ✅ **${{ env.PACKAGE_NAME }}** build successful for all targets!

            Download compiled `.ipk` packages from the artifacts section below (login required):

            [**View Action Run and Download Artifacts**](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
